services:
  - type: web
    name: omnitratech-backend
    runtime: node
    plan: free
    
    # GitHub Repository
    repo: https://github.com/yesschool565-arch/omnitratech-backend.git
    branch: main
    
    # Build Configuration
    buildCommand: npm install && npm run build
    startCommand: npm start
    
    # Environment Variables
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://YOUR_FRONTEND_DOMAIN.vercel.app
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        value: admin123
      - key: JWT_SECRET
        value: aFoZlWRbWgaeu321l7KKAV6p05waem82z63mXOQr97jcO+1dACh5qnR7UqVY5UGqAsZb4f81E9SzC1tl1vQ8RQ==
    
    # Persistent Storage for JSON Database
    disk:
      name: omnitratech-db
      mountPath: /opt/render/project/backend/data
      sizeGB: 1
    
    # Auto-deploy on GitHub push
    autoDeploy: true
    
    # Health Check
    healthCheckPath: /health
    
    # Region
    region: oregon
